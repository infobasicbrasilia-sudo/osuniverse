<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Microsoft Word - OS UNIVERSE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/static/css/word.css">
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
</head>
<body>
<div class="word-app">
    <div class="ribbon">
        <div class="tabs">
            <!-- Menu Arquivo -->
            <div class="file-menu tab-btn" id="fileMenuBtn">
                <i class="fas fa-file-alt"></i> Arquivo
                <div id="fileDropdown" class="file-dropdown">
                    <a id="newBtn"><i class="fas fa-file"></i> Novo</a>
                    <a id="openBtn"><i class="fas fa-folder-open"></i> Abrir...</a>
                    <a id="saveBtn"><i class="fas fa-save"></i> Salvar</a>
                    <div class="submenu">
                        <a id="saveAsBtn"><i class="fas fa-caret-right"></i> Salvar Como</a>
                        <div class="submenu-content">
                            <a id="saveAsDocx">Documento Word (.docx)</a>
                            <a id="saveAsPdf">Documento PDF (.pdf)</a>
                            <a id="saveAsTxt">Documento Texto (.txt)</a>
                        </div>
                    </div>
                    <div class="separator-dropdown"></div>
                    <a id="printBtn"><i class="fas fa-print"></i> Imprimir</a>
                </div>
            </div>
            <button class="tab-btn active" data-tab="home"><i class="fas fa-home"></i> Página Inicial</button>
            <button class="tab-btn" data-tab="edit"><i class="fas fa-edit"></i> Editar</button>
            <button class="tab-btn" data-tab="insert"><i class="fas fa-plus-circle"></i> Inserir</button>
            <button class="tab-btn" data-tab="headerfooter"><i class="fas fa-pager"></i> Cabeçalho/Rodapé</button>
        </div>

        <!-- ABA Página Inicial (formatação) -->
        <div id="home-tools" class="toolbar-container">
            <div class="toolbar">
                <div class="tool-group">
                    <span class="tool-group-label"><i class="fas fa-font"></i> Fonte</span>
                    <select id="fontFamily">
                        <option value="Arial">Arial</option>
                        <option value="Calibri" selected>Calibri</option>
                        <option value="Times New Roman">Times New Roman</option>
                        <option value="Verdana">Verdana</option>
                    </select>
                    <select id="fontSize">
                        <option value="1">8pt</option><option value="2">10pt</option>
                        <option value="3" selected>12pt</option><option value="4">14pt</option>
                        <option value="5">18pt</option><option value="6">24pt</option>
                    </select>
                    <button class="tool-btn" id="boldBtn"><i class="fas fa-bold"></i></button>
                    <button class="tool-btn" id="italicBtn"><i class="fas fa-italic"></i></button>
                    <button class="tool-btn" id="underlineBtn"><i class="fas fa-underline"></i></button>
                    <input type="color" id="fontColor" value="#000000">
                </div>
                <div class="tool-group">
                    <span class="tool-group-label"><i class="fas fa-align-left"></i> Parágrafo</span>
                    <button class="tool-btn" id="alignLeftBtn"><i class="fas fa-align-left"></i></button>
                    <button class="tool-btn" id="alignCenterBtn"><i class="fas fa-align-center"></i></button>
                    <button class="tool-btn" id="alignRightBtn"><i class="fas fa-align-right"></i></button>
                    <button class="tool-btn" id="alignJustifyBtn"><i class="fas fa-align-justify"></i></button>
                    <div class="separator"></div>
                    <button class="tool-btn" id="bulletListBtn"><i class="fas fa-list-ul"></i></button>
                    <button class="tool-btn" id="numberedListBtn"><i class="fas fa-list-ol"></i></button>
                    <button class="tool-btn" id="indentBtn"><i class="fas fa-indent"></i></button>
                    <button class="tool-btn" id="outdentBtn"><i class="fas fa-outdent"></i></button>
                </div>
            </div>
        </div>

        <!-- ABA EDITAR (desfazer, refazer, limpar, normalizar) -->
        <div id="edit-tools" class="toolbar-container hidden">
            <div class="toolbar">
                <div class="tool-group">
                    <span class="tool-group-label"><i class="fas fa-undo-alt"></i> Ações</span>
                    <button class="tool-btn" id="undoBtn" title="Desfazer (Ctrl+Z)"><i class="fas fa-undo"></i> Desfazer</button>
                    <button class="tool-btn" id="redoBtn" title="Refazer (Ctrl+Y)"><i class="fas fa-redo"></i> Refazer</button>
                    <div class="separator"></div>
                    <button class="tool-btn" id="clearFormatBtn" title="Remover formatação direta"><i class="fas fa-eraser"></i> Limpar</button>
                    <button class="tool-btn" id="normalizeBtn" title="Normalizar texto: remove macros, estilos externos"><i class="fas fa-broom"></i> Normalizar</button>
                </div>
            </div>
        </div>

        <!-- ABA Inserir -->
        <div id="insert-tools" class="toolbar-container hidden">
            <div class="toolbar">
                <div class="tool-group">
                    <button class="tool-btn" id="insertImageBtn"><i class="fas fa-image"></i> Imagem</button>
                    <button class="tool-btn" id="insertTableBtn"><i class="fas fa-table"></i> Tabela</button>
                </div>
                <div class="tool-group">
                    <button class="tool-btn" id="insertLinkBtn"><i class="fas fa-link"></i> Link</button>
                </div>
                <div class="tool-group">
                    <button class="tool-btn" id="insertSymbolBtn"><i class="fas fa-copyright"></i> Símbolo</button>
                </div>
            </div>
        </div>

        <!-- ABA Cabeçalho/Rodapé -->
        <div id="headerfooter-tools" class="toolbar-container hidden">
            <div class="toolbar">
                <div class="tool-group">
                    <button class="tool-btn" id="editHeaderBtn"><i class="fas fa-arrow-up"></i> Editar Cabeçalho</button>
                    <button class="tool-btn" id="editFooterBtn"><i class="fas fa-arrow-down"></i> Editar Rodapé</button>
                    <button class="tool-btn" id="editBodyBtn"><i class="fas fa-file-alt"></i> Editar Corpo</button>
                </div>
            </div>
        </div>
    </div>

    <!-- RÉGUA HORIZONTAL -->
    <div class="ruler-horizontal-container">
        <div class="ruler-horizontal" id="rulerHor"></div>
        <div class="ruler-label">centímetros</div>
    </div>

    <!-- ÁREA DO DOCUMENTO -->
    <div class="document-area">
        <div class="vertical-ruler" id="verticalRuler">
            <div class="vertical-scale" id="verticalScale"></div>
        </div>
        <div class="editor-wrapper">
            <div id="globalHeader" class="section header-section" contenteditable="true"></div>
            <div id="pagesContainer"></div>
            <div id="globalFooter" class="section footer-section" contenteditable="true"></div>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-left"><span><i class="far fa-file-alt"></i> OS UNIVERSE Word</span></div>
        <div class="status-right"></div>
    </div>
</div>

<input type="file" id="fileOpenInput" style="display:none" accept=".txt,.doc,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />

<script src="/static/js/word.js"></script>
</body>
</html>
